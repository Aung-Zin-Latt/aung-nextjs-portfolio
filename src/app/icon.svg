<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- High-contrast tab icon (similar legibility model to badge-style favicons). -->
  <rect width="32" height="32" rx="7" ry="7" fill="hsl(239deg 76% 58%)" />
  <!-- No `dy`; it fights `dominant-baseline` and drags capitals downward in tab icons. -->
  <text
    x="16"
    y="16"
    text-anchor="middle"
    dominant-baseline="central"
    fill="#ffffff"
    font-family='ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
    font-size="17"
    font-weight="800"
    letter-spacing="-0.06em"
  >
    A
  </text>
</svg>
